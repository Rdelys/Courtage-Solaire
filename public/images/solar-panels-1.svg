<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff1ff"/>
      <stop offset="100%" stop-color="#f7fcff"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3a5e"/>
      <stop offset="100%" stop-color="#2a5788"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky2)"/>
  <circle cx="420" cy="60" r="38" fill="#ffb020"/>

  <g transform="translate(60,60) rotate(-6)">
    <rect x="0" y="0" width="380" height="220" rx="4" fill="url(#cell)" stroke="#0f2038" stroke-width="4"/>
    <!-- grid of cells -->
    <g stroke="#4a7ab0" stroke-width="2">
      <line x1="63" y1="0" x2="63" y2="220"/>
      <line x1="126" y1="0" x2="126" y2="220"/>
      <line x1="189" y1="0" x2="189" y2="220"/>
      <line x1="252" y1="0" x2="252" y2="220"/>
      <line x1="315" y1="0" x2="315" y2="220"/>
      <line x1="0" y1="55" x2="380" y2="55"/>
      <line x1="0" y1="110" x2="380" y2="110"/>
      <line x1="0" y1="165" x2="380" y2="165"/>
    </g>
    <!-- glare -->
    <polygon points="20,0 90,0 40,220 0,220" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- Support legs -->
  <line x1="90" y1="270" x2="120" y2="330" stroke="#7a8290" stroke-width="8"/>
  <line x1="350" y1="240" x2="380" y2="330" stroke="#7a8290" stroke-width="8"/>

  <!-- grass -->
  <rect x="0" y="320" width="500" height="30" fill="#dcefdc"/>
</svg>
