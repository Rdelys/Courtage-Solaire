<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#274b73"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2694b"/>
      <stop offset="100%" stop-color="#c85539"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="500" cy="80" r="45" fill="#ffb020"/>
  <g stroke="#ffb020" stroke-width="6" stroke-linecap="round">
    <line x1="500" y1="10" x2="500" y2="0"/>
    <line x1="560" y1="30" x2="568" y2="22"/>
    <line x1="580" y1="80" x2="592" y2="80"/>
    <line x1="560" y1="130" x2="568" y2="138"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="360" width="600" height="60" fill="#dfeee0"/>

  <!-- House -->
  <rect x="90" y="230" width="220" height="130" fill="#ffffff" stroke="#d7dee5" stroke-width="2"/>
  <polygon points="80,230 200,150 320,230" fill="url(#roof)"/>

  <!-- Solar panels on roof -->
  <g transform="translate(120,190) rotate(-18)">
    <rect x="0" y="0" width="60" height="34" fill="url(#panel)" stroke="#12233b" stroke-width="1.5"/>
    <line x1="15" y1="0" x2="15" y2="34" stroke="#3a5f8a" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="34" stroke="#3a5f8a" stroke-width="1"/>
    <line x1="45" y1="0" x2="45" y2="34" stroke="#3a5f8a" stroke-width="1"/>
  </g>
  <g transform="translate(178,164) rotate(-18)">
    <rect x="0" y="0" width="60" height="34" fill="url(#panel)" stroke="#12233b" stroke-width="1.5"/>
    <line x1="15" y1="0" x2="15" y2="34" stroke="#3a5f8a" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="34" stroke="#3a5f8a" stroke-width="1"/>
    <line x1="45" y1="0" x2="45" y2="34" stroke="#3a5f8a" stroke-width="1"/>
  </g>

  <!-- Windows / door -->
  <rect x="115" y="260" width="45" height="45" fill="#eaf3fb" stroke="#c6d5e2" stroke-width="2"/>
  <rect x="240" y="260" width="45" height="45" fill="#eaf3fb" stroke="#c6d5e2" stroke-width="2"/>
  <rect x="178" y="290" width="40" height="70" fill="#8a5a3c"/>

  <!-- Ground-mounted solar array -->
  <g transform="translate(360,300)">
    <rect x="0" y="0" width="90" height="50" fill="url(#panel)" stroke="#12233b" stroke-width="1.5" transform="skewX(-8)"/>
    <line x1="22" y1="0" x2="22" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <line x1="44" y1="0" x2="44" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <line x1="66" y1="0" x2="66" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <rect x="30" y="50" width="6" height="20" fill="#8a8f98"/>
  </g>
  <g transform="translate(460,310)">
    <rect x="0" y="0" width="90" height="50" fill="url(#panel)" stroke="#12233b" stroke-width="1.5" transform="skewX(-8)"/>
    <line x1="22" y1="0" x2="22" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <line x1="44" y1="0" x2="44" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <line x1="66" y1="0" x2="66" y2="50" stroke="#3a5f8a" stroke-width="1" transform="skewX(-8)"/>
    <rect x="30" y="50" width="6" height="20" fill="#8a8f98"/>
  </g>

  <!-- Small bushes -->
  <circle cx="60" cy="355" r="16" fill="#7fb87f"/>
  <circle cx="340" cy="358" r="14" fill="#7fb87f"/>
</svg>
